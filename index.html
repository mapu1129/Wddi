<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maftuna ❤️ Umarjon</title>

<style>
body{
margin:0;
font-family:Georgia,serif;
background:#fffaf7;
color:#6b4a20;
text-align:center;
}
.card{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(#ffffffdd,#ffffffdd),
url("https://images.unsplash.com/photo-1519741497674-611481863552");
background-size:cover;
}
.box{
max-width:430px;
padding:35px 25px;
border:3px solid #d4af37;
border-radius:30px;
box-shadow:0 0 30px #d4af3766;
background:white;
}
h1{
font-size:42px;
color:#c79a20;
}
.gold{
color:#b8860b;
font-weight:bold;
}
p{
font-size:19px;
line-height:1.6;
}
button{
background:#d4af37;
color:white;
border:0;
padding:14px 25px;
border-radius:30px;
font-size:17px;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card">
<div class="box">

<h2>🤍🌸🤍</h2>

<h1>
Maftuna<br>
❤️<br>
Umarjon
</h1>

<p>
Sizni aziz farzandlarimizning
<br>
<b>nikoh to‘yiga</b>
taklif qilamiz.
</p>

<p class="gold">
7-AVGUST 2026
</p>

<p>
🕗 Soat: <b>20:00</b><br>
📍 G‘ijduvon
</p>

<p>
<b>Kuyov tomoni:</b><br>
Nodir & Iqbola
</p>

<p>
<b>Kelin tomoni:</b><br>
Kamol & Muxabbat
</p>

<p>
🤍 Sizning tashrifingiz biz uchun katta baxt 🤍
</p>

<button onclick="playMusic()">
🎵 Musiqani yoqish
</button>

</div>
</div>

<script>
function playMusic(){
document.getElementById("music").play();
}
</script>

</body>
</html>
